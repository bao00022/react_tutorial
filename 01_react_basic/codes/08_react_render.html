<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <button onclick="step1()">Step 1: Initial render</button>
    <button onclick="step2()">Step 2: Add item 3</button>
    <button onclick="step3()">Step 3: Add item 4</button>

    <div id="root"></div>

    <script type="text/babel">

        const root = ReactDOM.createRoot(document.getElementById('root'));

        function step1() {
            root.render(<ul><li>item 1</li><li>item 2</li></ul>);
        }
        function step2() {
            root.render(<ul><li>item 1</li><li>item 2</li><li>item 3</li></ul>);
        }
        function step3() {
            root.render(<ul><li>item 1</li><li>item 2</li><li>item 3</li><li>item 4</li></ul>);
        }
    </script>
    
</body>
</html>

<!--
This example demonstrates React's “incremental update” or “minimal DOM operations” principle.

Each time you click a button and call root.render with a new React Element, React compares the new and old virtual DOM trees and makes only the necessary, minimal changes to the real DOM (e.g. only appending the new li element) rather than regenerating everything from scratch.

Through this example, you can intuitively understand:

React does not “rebuild” the entire DOM on every render — it only updates the parts that changed.
This is one reason React is efficient, and it is the core value of the virtual DOM.
-->
