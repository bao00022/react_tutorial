<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        const element1 = <h2 className="title">Hello, JSX!</h2>;

        const element2 = React.createElement("h2", { className: "title" }, "Hello, JSX!");

        console.log('element1 = ', element1);
        console.log('element2 = ', element2);
        // element1 and element2 are identical
        // With Babel, we can write declarative UI that is more intuitive
        // element1 is a React element created with JSX syntax
        // element2 is a React element created with React.createElement

    </script>
</body>
</html>
