<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const root = ReactDOM.createRoot(document.getElementById("root"));

      // From here on, we use JSX to create React elements. The rest of the setup can be treated as a standard template.
      // Component 1
      function Header() {
        return (
          <header>
            <h1>React Handbook</h1>
            <h2>Open source, free, professional, and easy to use</h2>
          </header>
        );
      }
      // Component 2
      function Main({ name }) {
        return (
          <main>
            <p>Master {name} and you are one step closer to changing the world.</p>
            <input placeholder="Type your thoughts" />
            <button>Submit</button>
          </main>
        );
      }

      // Component composition - demonstrates the true nature of JSX syntactic sugar
      const app = (
        <div>
          <Header />

          {/* JSX syntax sugar - looks like HTML attributes, but is actually an object */}
          <Main name="react" />

          {/* Direct function call - reveals the actual object structure */}
          {Main({ name: "JavaScript" })}

          {/*
                The JSX above is equivalent to:
                React.createElement(Main, { name: "react" }, null)
                So name="react" ultimately becomes the object { name: "react" }
                */}
        </div>
      );

      root.render(app);
    </script>
  </body>
</html>
