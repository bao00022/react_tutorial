<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const root = ReactDOM.createRoot(document.getElementById("root"));

      // 从现在开始，我们使用JSX语法来创建React元素，其他配置可以认作标准模板
      // 组件1
      function Header() {
        return (
          <header>
            <h1>React 小书</h1>
            <h2>开源、免费、专业、易用</h2>
          </header>
        );
      }
      // 组件2
      function Main({ name }) {
        return (
          <main>
            <p>学会 {name} ，离改变世界只差一个你。</p>
            <input placeholder="输入你的想法" />
            <button>提交</button>
          </main>
        );
      }

      // 组件组合 - 展示JSX语法糖的本质
      const app = (
        <div>
          <Header />

          {/* JSX 语法糖 - 看起来像HTML属性，实际是对象 */}
          <Main name="react" />

          {/* 直接调用函数 - 暴露了对象的真实结构 */}
          {Main({ name: "JavaScript" })}

          {/* 
                上面的JSX实际上等价于：
                React.createElement(Main, { name: "react" }, null)
                所以 name="react" 最终变成了对象 { name: "react" }
                */}
        </div>
      );

      root.render(app);
    </script>
  </body>
</html>
