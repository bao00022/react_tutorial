<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const root = ReactDOM.createRoot(document.getElementById("root")); // ReactDOMRoot

      const linkName = "item 3";
      const linkAddress = "http://abc.com";

      const ul = (
        <ul>
          <li>item 1</li>
          <li className="active">item 2</li>
          <li>
            <a href={linkAddress}>{linkName}</a>
          </li>
        </ul>
      );

      console.log(ul);
      // The ul above is written in JSX — a JavaScript syntax extension invented by Facebook
      // Inside JSX you can embed any JavaScript expression by wrapping it in {}

      // Compare with the ul in 03_react_create_element.html: JSX compiles into React.createElement calls
      // With Babel, we can write declarative UI that is more readable and avoids XSS risks
      // JSX is a superset of JavaScript syntax and ultimately compiles to plain JavaScript
      // JSX is syntactic sugar built on top of JavaScript

      root.render(ul);
    </script>
  </body>
</html>
